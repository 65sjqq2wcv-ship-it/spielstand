<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MultiScore 4</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --p1-color: #2ec4b6; /* Türkis */
            --p2-color: #ff6b6b; /* Koralle */
            --p3-color: #a29bfe; /* Pastell-Lila */
            --p4-color: #feca57; /* Sonnengelb */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            height: 100vh;
            width: 100vw;
        }

        .player-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            color: white;
            transition: transform 0.05s;
        }

        .player-card:active {
            transform: scale(0.98);
            filter: brightness(1.1);
        }

        /* Spielerfarben */
        .p1 { background-color: var(--p1-color); }
        .p2 { background-color: var(--p2-color); }
        .p3 { background-color: var(--p3-color); }
        .p4 { background-color: var(--p4-color); }

        .name-label {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 5px;
            opacity: 0.9;
            background: none;
            border: none;
            color: white;
            text-align: center;
            width: 80%;
        }

        .score-value {
            font-size: clamp(5rem, 20vw, 12rem);
            font-weight: 800;
            line-height: 1;
        }

        /* Korrektur-Button */
        .minus-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 44px;
            height: 44px;
            background: rgba(0, 0, 0, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }

        /* Zentrale Steuerung */
        .center-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: #1a1a1a;
            padding: 10px;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            display: flex;
            gap: 10px;
        }

        .reset-btn {
            background: #333;
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Icon oben links zur Zierde */
        .app-icon-small {
            position: absolute;
            top: 15px;
            left: 15px;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <div class="player-card p1" onclick="updateScore(0, 1)">
            <input type="text" class="name-label" value="Spieler 1" onclick="event.stopPropagation()">
            <div class="score-value" id="s0">0</div>
            <div class="minus-btn" onclick="event.stopPropagation(); updateScore(0, -1)">−</div>
        </div>

        <div class="player-card p2" onclick="updateScore(1, 1)">
            <input type="text" class="name-label" value="Spieler 2" onclick="event.stopPropagation()">
            <div class="score-value" id="s1">0</div>
            <div class="minus-btn" onclick="event.stopPropagation(); updateScore(1, -1)">−</div>
        </div>

        <div class="player-card p3" onclick="updateScore(2, 1)">
            <input type="text" class="name-label" value="Spieler 3" onclick="event.stopPropagation()">
            <div class="score-value" id="s2">0</div>
            <div class="minus-btn" onclick="event.stopPropagation(); updateScore(2, -1)">−</div>
        </div>

        <div class="player-card p4" onclick="updateScore(3, 1)">
            <input type="text" class="name-label" value="Spieler 4" onclick="event.stopPropagation()">
            <div class="score-value" id="s3">0</div>
            <div class="minus-btn" onclick="event.stopPropagation(); updateScore(3, -1)">−</div>
        </div>
    </div>

    <div class="center-menu">
        <button class="reset-btn" onclick="resetAll()">↻</button>
    </div>

    <script>
        let scores = [0, 0, 0, 0];

        // Beim Start gespeicherte Werte laden
        window.onload = () => {
            const saved = localStorage.getItem('multiscore_values');
            if (saved) {
                scores = JSON.parse(saved);
                scores.forEach((s, i) => document.getElementById(`s${i}`).innerText = s);
            }
        };

        function updateScore(idx, val) {
            scores[idx] = Math.max(0, scores[idx] + val);
            document.getElementById(`s${idx}`).innerText = scores[idx];
            localStorage.setItem('multiscore_values', JSON.stringify(scores));
            
            // Haptisches Feedback (falls vom Gerät unterstützt)
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }

        function resetAll() {
            if (confirm("Alle Spielstände löschen?")) {
                scores = [0, 0, 0, 0];
                scores.forEach((s, i) => document.getElementById(`s${i}`).innerText = s);
                localStorage.removeItem('multiscore_values');
            }
        }

        // Service Worker Registrierung
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
