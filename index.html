<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MultiScore Flex</title>
    
    <link rel="manifest" href="manifest.json?v=2">
    
    <link rel="apple-touch-icon" href="icon.png?v=2">
    <link rel="apple-touch-icon" sizes="152x152" href="icon.png?v=2">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png?v=2">

    <link rel="icon" type="image/png" sizes="32x32" href="icon.png?v=2">
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png?v=2">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png?v=2">
    
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --p1-color: #2ec4b6; /* Türkis */
            --p2-color: #ff6b6b; /* Koralle */
            --p3-color: #a29bfe; /* Pastell-Lila */
            --p4-color: #feca57; /* Sonnengelb */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100vh;
            width: 100vw;
            background-color: #1a1a1a;
            overflow: hidden;
            position: relative;
        }

        /* Das Haupt-Grid füllt exakt den sichtbaren Bildschirm aus */
        .grid-container {
            display: grid;
            height: 100%;
            width: 100%;
            transition: all 0.25s ease-out;
        }

        /* 2 Spieler: Zwei Zeilen, die jeweils exakt 50% hoch sind */
        .grid-container.players-2 {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
        }

        /* 3 Spieler: Reihe 1 hat zwei Spalten, Reihe 2 eine gestreckte Spalte */
        .grid-container.players-3 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        .grid-container.players-3 #card-2 {
            grid-column: span 2;
        }

        /* 4 Spieler: 2x2 Kacheln jeweils exakt gleich groß */
        .grid-container.players-4 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        .player-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            color: white;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        /* Verhindert, dass die iOS-Statusleiste den Text von Spieler 1 & 2 überlagert */
        #card-0, #card-1 {
            padding-top: calc(20px + env(safe-area-inset-top));
        }

        .p1 { background-color: var(--p1-color); }
        .p2 { background-color: var(--p2-color); }
        .p3 { background-color: var(--p3-color); }
        .p4 { background-color: var(--p4-color); }

        .name-label {
            font-size: clamp(1.5rem, 5vw, 2.2rem);
            font-weight: 700;
            margin-bottom: 10px;
            opacity: 0.95;
            background: none;
            border: none;
            color: white;
            text-align: center;
            width: 90%;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
        }

        .score-value {
            font-size: clamp(6rem, 25vh, 13rem);
            font-weight: 800;
            line-height: 0.9;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Korrektur-Button dezent unten rechts in jeder Kachel platziert */
        .minus-btn {
            position: absolute;
            bottom: calc(15px + env(safe-area-inset-bottom));
            right: 15px;
            width: 46px;
            height: 46px;
            background: rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            color: white;
            font-size: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .minus-btn:active {
            background: rgba(0, 0, 0, 0.35);
        }

        /* Das zentrierte Menü bleibt immer exakt im Mittelpunkt */
        .center-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: #1a1a1a;
            padding: 6px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .control-btn {
            background: #2a2a2a;
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .control-btn:active {
            background: #444;
        }

        .player-select {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="grid-container players-2" id="board-grid">
        <div class="player-card p1" id="card-0" onclick="updateScore(0, 1)">
            <input type="text" class="name-label" value="Ute" onclick="event.stopPropagation()">
            <div class="score-value" id="s0">3</div>
            <div class="minus-btn" onclick="event.stopPropagation(); updateScore(0, -1)">−</div>
        </div>
