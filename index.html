<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MultiScore Flex</title>
    
    <link rel="manifest" href="manifest.json?v=8">
    
    <link rel="apple-touch-icon" href="icon.png?v=8">
    <link rel="apple-touch-icon" sizes="152x152" href="icon.png?v=8">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png?v=8">

    <link rel="icon" type="image/png" sizes="32x32" href="icon.png?v=8">
    <link rel="icon" type="image/png" sizes="192x192" href="icon.png?v=8">
    <link rel="icon" type="image/png" sizes="512x512" href="icon.png?v=8">
    
    <meta id="meta-theme-color" name="theme-color" content="#2ec4b6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <style>
        :root {
            --p1-color: #2ec4b6; /* Türkis */
            --p2-color: #ff6b6b; /* Koralle */
            --p3-color: #a29bfe; /* Pastell-Lila */
            --p4-color: #feca57; /* Sonnengelb */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
            background-color: #1a1a1a; /* Neutrale Fallback-Farbe */
            overflow: hidden;
            position: relative;
        }

        /* ABSOLUTE FIXIERUNG: Zwingt das Spielfeld bis an die physikalischen Ränder des iPhones */
        .grid-container {
            display: grid;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            transition: all 0.2s ease-out;
        }

        /* 2 Spieler: Zwei Zeilen */
        .grid-container.players-2 {
            grid-template-columns: 1fr;
            grid-template-rows: 1fr 1fr;
        }

        /* 3 Spieler */
        .grid-container.players-3 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }
        .grid-container.players-3 #card-2 {
            grid-column: span 2;
        }

        /* 4 Spieler */
        .grid-container.players-4 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
        }

        /* Allgemeine Spieler-Kachel */
        .player-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            color: white;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .p1 { background-color: var(--p1-color); }
        .p2 { background-color: var(--p2-color); }
        .p3 { background-color: var(--p3-color); }
        .p4 { background-color: var(--p4-color); }

        /* SCHUTZ-PADDING FÜR DIE OBERE STATUSLEISTE / NOTCH */
        .players-2 #card-0 { padding-top: calc(20px + env(safe-area-inset-top)); }
        .players-3 #card-0, .players-3 #card-1,
        .players-4 #card-0, .players-4 #card-1 { 
            padding-top: calc(20px + env(safe-area-inset-top)); 
        }

        /* PADDING-SCHUTZ FÜR DIE UNTERE HOME-BAR GESTENSTEUERUNG */
        .players-2 #card-1 { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .players-3 #card-2 { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
        .players-4 #card-2, .players-4 #card-3 { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }

        .name-label {
            font-size: clamp(1.4rem, 4.5vh, 2.2rem);
            font-weight: 700;
            margin-bottom: 5px;
            opacity: 0.95;
            background: none;
            border: none;
            color: white;
            text-align: center;
            width: 90%;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
        }

        .score-value {
            font-size: clamp(5.5rem, 22vh, 12rem);
            font-weight: 800;
            line-height: 0.85;
            text-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        /* Minus-Buttons wandern automatisch über die Home-Bar, damit sie klickbar sind */
        .minus-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 46px;
            height: 46px;
            background: rgba(0, 0, 0, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.25);
            border-radius: 50%;
            color: white;
            font-size: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .minus-btn:active {
            background: rgba(0, 0, 0, 0.35);
        }

        .players-2 #card-1 .minus-btn,
        .players-3 #card-2 .minus-btn,
        .players-4 #card-2 .minus-btn, .players-4 #card-3 .minus-btn {
            bottom: calc(15px + env(safe-area-inset-bottom));
        }

        /* Menü perfekt im Zentrum */
        .center-menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: #1a1a1a;
            padding: 6px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .control-btn {
            background: #2a2a2a;
            border: none;
            color: white;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .control-btn:active {
            background: #444;
        }

        .player-select {
            background: #2a2a2a;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 0.95rem;
            font-weight: bold;
            outline: none;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
        }
    </style>
</head>
<body>

    <div class="grid-container players-2" id="board-grid">
        <div class="player-card p1" id="card-0" onclick="updateScore(0, 1)">
            <input type="text" class="name-label" value="Ute" onclick="event.stopPropagation()">
            <div class="score-value" id="s0">0</div>
            <div class="minus-btn" onclick="event.stopPropagation(); updateScore(0, -1)">−</div>
        </div>

        <div class="player-card p2" id="card-1" onclick="updateScore(1, 1)">
            <input type="text" class="name-label" value="Michael" onclick="event.stopPropagation()">
            <div class="score-value" id="s1">0</div>
            <div class="minus-btn" onclick="event.stopPropagation(); updateScore(1, -1)">−</div>
        </div>

        <div class="player-card p3" id="card-2" onclick="updateScore(2, 1)" style="display: none;">
            <input type="text" class="name-label" value="Spieler 3" onclick="event.stopPropagation()">
            <div class="score-value" id="s2">0</div>
            <div class="minus-btn" onclick="event.stopPropagation(); updateScore(2, -1)">−</div>
        </div>

        <div class="player-card p4" id="card-3" onclick="updateScore(3, 1)" style="display: none;">
            <input type="text" class="name-label" value="Spieler 4" onclick="event.stopPropagation()">
            <div class="score-value" id="s3">0</div>
            <div class="minus-btn" onclick="event.stopPropagation(); updateScore(3, -1)">−</div>
        </div>
    </div>

    <div class="center-menu">
        <select class="player-select" id="playerCountSelect" onchange="changePlayerCount(this.value)">
            <option value="2">2 Spieler</option>
            <option value="3">3 Spieler</option>
            <option value="4">4 Spieler</option>
        </select>
        <button class="control-btn" onclick="resetAll()" title="Reset">↻</button>
    </div>

    <script>
        let scores = [0, 0, 0, 0];
        let currentPlayerCount = 2;

        window.onload = () => {
            const savedScores = localStorage.getItem('flexscore_values');
            if (savedScores) {
                scores = JSON.parse(savedScores);
                scores.forEach((s, i) => {
                    const el = document.getElementById(`s${i}`);
                    if(el) el.innerText = s;
                });
            }

            const savedCount = localStorage.getItem('flexscore_count');
            if (savedCount) {
                currentPlayerCount = parseInt(savedCount);
                document.getElementById('playerCountSelect').value = currentPlayerCount;
            }
            changePlayerCount(currentPlayerCount);
        };

        function changePlayerCount(count) {
            currentPlayerCount = parseInt(count);
            const grid = document.getElementById('board-grid');
            const themeMeta = document.getElementById('meta-theme-color');
            
            grid.className = `grid-container players-${currentPlayerCount}`;
            
            for (let i = 0; i < 4; i++) {
                const card = document.getElementById(`card-${i}`);
                card.style.display = i < currentPlayerCount ? 'flex' : 'none';
            }
            
            // Setzt das obere Meta-Tag zuverlässig auf das Türkis von Ute/Spieler 1
            if (themeMeta) {
                themeMeta.setAttribute('content', '#2ec4b6');
            }
            
            localStorage.setItem('flexscore_count', currentPlayerCount);
        }

        function updateScore(idx, val) {
            scores[idx] = Math.max(0, scores[idx] + val);
            document.getElementById(`s${idx}`).innerText = scores[idx];
            localStorage.setItem('flexscore_values', JSON.stringify(scores));
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }

        function resetAll() {
            if (confirm("Alle sichtbaren Spielstände zurücksetzen?")) {
                for(let i = 0; i < currentPlayerCount; i++) {
                    scores[i] = 0;
                    document.getElementById(`s${i}`).innerText = 0;
                }
                localStorage.setItem('flexscore_values', JSON.stringify(scores));
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            window.location.reload();
                        }
                    });
                });
            });
        }
    </script>
</body>
</html>
